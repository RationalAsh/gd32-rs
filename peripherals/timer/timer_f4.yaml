TIMER[1-4]:
  CTL0:
    CKDIV:
      CKDIV0: [0, "Clock division factor 1"]
      CKDIV1: [1, "Clock division factor 2"]
      CKDIV2: [2, "Clock division factor 4"]
    ARSE:
      Disabled: [0, "The shadow register for CAR is disabled"]
      Enabled: [1, "The shadow register for CAR is enabled"]
    CAM:
      NoCenterAlign: [0, "No Center aligned mode. Direction specified by DIR bit."]
      CenterAlignCountDownAssert:
        [
          1,
          "Center-aligned and counting down assert mode. The counter counts under center-aligned and channel is configured in output mode (CHxMS=00 in TIMERx_CHCTL0 register). Only when counting down, CHxF bit can be set.",
        ]
      CenterAlignCountUpAssert: [
          2,
          "Center-aligned and counting up assert mode. The counter counts under center-
          aligned and channel is configured in output mode (CHxMS=00 in TIMERx_CHCTL0
          register). Only when counting up, CHxF bit can be set.",
        ]
      CenterAlignCountUpDownAssert: [
          3,
          "Center-aligned and counting up/down assert mode. The counter counts under center-aligned and channel is configured in output mode (CHxMS=00 in
          TIMERx_CHCTL0 register). Both when counting up and counting down, CHxF bit
          can be set.
          After the counter is enabled, cannot be switched from 0x00 to non 0x00.",
        ]
    DIR:
      Up: [0, "Counter counts up"]
      Down: [1, "Counter counts down"]
    SPM:
      Disabled: [0, "Single pulse mode disabled."]
      Enabled: [1, "Single pulse mode enabled."]
    UPS:
      AnyEvent: [
          0,
          "Any of counter overflow/underflow, setting UPG, or update through slave
          mode, generates an update interrupt or DMA request",
        ]
      CounterOnly:
        [1, "Only counter overflow/underflow generates an update interrupt or DMA request"]
    UPDIS:
      Enabled: [0, "Update event enabled"]
      Disabled: [1, "Update event disabled"]
    CEN:
      Disabled: [0, "Counter disabled"]
      Enabled: [1, "Counter enabled"]
  CTL1:
    TI0S:
      CH0: [0, "TIMERx_CH0 is selected as channel 0 trigger input"]
      MULTI:
        [
          1,
          "The result of combinational XOR of TIMERx_CH0, TIMERx_CH1, TIMERx_CH2 is selected as channel 0 trigger input",
        ]
    MMC:
      Mode0: [
          0,
          "When a counter reset event occurs, a TRGO trigger signal is output. The
          counter resert source:
          Master timer generate a reset
          the UPG bit in the TIMERx_SWEVG register is set",
        ]
      Mode1: [
          1,
          "Enable. When a conter start event occurs, a TRGO trigger signal is output. The
          counter start source :
          CEN control bit is set
          The trigger input in pause mode is high",
        ]
      Mode2: [
          2,
          "When an update event occurs, a TRGO trigger signal is output. The update
          source depends on UPDIS bit and UPS bit.",
        ]
      Mode3: [
          3,
          "When a capture or compare pulse event occurs in channel0, a TRGO trigger
          signal is output.",
        ]
      Mode4: [
          4,
          "When a compare event occurs, a TRGO trigger signal is output. The compare
          source is from O0CPRE.",
        ]
      Mode5: [
          5,
          "When a compare event occurs, a TRGO trigger signal is output. The compare
          source is from O1CPRE.",
        ]
      Mode6: [
          6,
          "When a compare event occurs, a TRGO trigger signal is output. The compare
          source is from O2CPRE.",
        ]
      Mode7: [
          7,
          "When a compare event occurs, a TRGO trigger signal is output. The compare
          source is from O3CPRE.",
        ]
    DMAS:
      CaptureOrCompare: [0, "DMA request is generated by capture/compare event"]
      Update: [1, "DMA request is generated by update event"]
  SMCFG:
    ETP:
      RisingEdge: [0, "ETI is active at rising edge or high level."]
      FallingEdge: [1, "ETI is active at falling edge or low level."]
    SMC1:
      Disabled: [0, "External clock mode 1 disabled."]
      Enabled:
        [
          1,
          "External clock mode 1 enabled. Counter is clocked by any active edge of the ETIFP signal.",
        ]
    ETPSC:
      PSC0: [0, "Prescale is disabled."]
      PSC1: [1, "Prescale is divided by 2."]
      PSC2: [2, "Prescale is divided by 4."]
      PSC3: [3, "Prescale is divided by 8."]
    ETFC:
      Disabled: [0, "ETIFP filter disabled."]
      CAPACITY1: [1, "ETIFP filter capacity is 2, f_samp is fck_timer"]
      CAPACITY2: [2, "ETIFP filter capacity is 4, f_samp is fck_timer"]
      CAPACITY3: [3, "ETIFP filter capacity is 8, f_samp is fck_timer"]
      CAPACITY4: [4, "ETIFP filter capacity is 6, f_samp is fck_timer / 2"]
      CAPACITY5: [5, "ETIFP filter capacity is 8, f_samp is fck_timer / 2"]
      CAPACITY6: [6, "ETIFP filter capacity is 6, f_samp is fck_timer / 4"]
      CAPACITY7: [7, "ETIFP filter capacity is 8, f_samp is fck_timer / 4"]
      CAPACITY8: [8, "ETIFP filter capacity is 6, f_samp is fck_timer / 8"]
      CAPACITY9: [9, "ETIFP filter capacity is 8, f_samp is fck_timer / 8"]
      CAPACITY10: [10, "ETIFP filter capacity is 5, f_samp is fck_timer / 16"]
      CAPACITY11: [11, "ETIFP filter capacity is 6, f_samp is fck_timer / 16"]
      CAPACITY12: [12, "ETIFP filter capacity is 8, f_samp is fck_timer / 16"]
      CAPACITY13: [13, "ETIFP filter capacity is 5, f_samp is fck_timer / 32"]
      CAPACITY14: [14, "ETIFP filter capacity is 6, f_samp is fck_timer / 32"]
      CAPACITY15: [15, "ETIFP filter capacity is 8, f_samp is fck_timer / 32"]
    MSM:
      Disabled: [0, "Master/slave mode disabled."]
      Master: [1, "Master mode enabled."]
    TRGS:
      ITI0: [0, "Trigger input is ITI0."]
      ITI1: [1, "Trigger input is ITI1."]
      ITI2: [2, "Trigger input is ITI2."]
      ITI3: [3, "Trigger input is ITI3."]
      CI0F_EDGE: [4, "Trigger input is CI0F_EDGE."]
      CI0FE0: [5, "Trigger input is CI0FE0."]
      CI1FE1: [6, "Trigger input is CI1FE1."]
      ETIFP: [7, "Trigger input is ETIFP."]
    SMC:
      Disabled: [0, "Slave mode disabled."]
      EncoderMode1: [
          1,
          "Quadrature decoder mode 0.The counter counts on CI0FE0 edge, while the
          direction depends on CI1FE1 level.",
        ]
      EncoderMode2: [
          2,
          "Quadrature decoder mode 1.The counter counts on CI1FE1 edge, while the
          direction depends on CI0FE0 level.",
        ]
      EncoderMode3: [
          3,
          "Quadrature decoder mode 2.The counter counts on both CI0FE0 and CI1FE1
          edge, while the direction depends on each other.",
        ]
      RestartMode: [
          4,
          "Restart mode. The counter is reinitialized and an update event is generated on
          the rising edge of the selected trigger input.",
        ]
      PauseMode: [
          5,
          "Pause mode. The trigger input enables the counter clock when it is high and
          disables the counter clock when it is low.",
        ]
      TriggerMode: [6, "Event mode. A rising edge of the trigger input enables the counter."]
      ExternalClockMode1: [
          7,
          "External clock mode 0. The counter counts on the rising edges of the selected
          trigger.",
        ]
  DMAINTEN:
    TRGDEN:
      Disabled: [0, "Trigger DMA request disabled."]
      Enabled: [1, "Trigger DMA request enabled."]
    CH3DEN:
      Disabled: [0, "Channel 3 capture/compare DMA request disabled."]
      Enabled: [1, "Channel 3 capture/compare DMA request enabled."]
    CH2DEN:
      Disabled: [0, "Channel 2 capture/compare DMA request disabled."]
      Enabled: [1, "Channel 2 capture/compare DMA request enabled."]
    CH1DEN:
      Disabled: [0, "Channel 1 capture/compare DMA request disabled."]
      Enabled: [1, "Channel 1 capture/compare DMA request enabled."]
    CH0DEN:
      Disabled: [0, "Channel 0 capture/compare DMA request disabled."]
      Enabled: [1, "Channel 0 capture/compare DMA request enabled."]
    UPDEN:
      Disabled: [0, "Update DMA request disabled."]
      Enabled: [1, "Update DMA request enabled."]
    TRGIE:
      Disabled: [0, "Trigger interrupt disabled."]
      Enabled: [1, "Trigger interrupt enabled."]
    CH3IE:
      Disabled: [0, "Channel 3 capture/compare interrupt disabled."]
      Enabled: [1, "Channel 3 capture/compare interrupt enabled."]
    CH2IE:
      Disabled: [0, "Channel 2 capture/compare interrupt disabled."]
      Enabled: [1, "Channel 2 capture/compare interrupt enabled."]
    CH1IE:
      Disabled: [0, "Channel 1 capture/compare interrupt disabled."]
      Enabled: [1, "Channel 1 capture/compare interrupt enabled."]
    CH0IE:
      Disabled: [0, "Channel 0 capture/compare interrupt disabled."]
      Enabled: [1, "Channel 0 capture/compare interrupt enabled."]
    UPIE:
      Disabled: [0, "Update interrupt disabled."]
      Enabled: [1, "Update interrupt enabled."]
  INTF:
    CH3OF:
      Clear: [0, "No channel 3 overflow/underflow interrupt occurred."]
      OverflowPending: [1, "Channel 3 overflow/underflow interrupt pending."]
    CH2OF:
      Clear: [0, "No channel 2 overflow/underflow interrupt occurred."]
      OverflowPending: [1, "Channel 2 overflow/underflow interrupt pending."]
    CH1OF:
      Clear: [0, "No channel 1 overflow/underflow interrupt occurred."]
      OverflowPending: [1, "Channel 1 overflow/underflow interrupt pending."]
    CH0OF:
      Clear: [0, "No channel 0 overflow/underflow interrupt occurred."]
      OverflowPending: [1, "Channel 0 overflow/underflow interrupt pending."]
    TRGIF:
      Clear: [0, "No trigger interrupt occurred."]
      TriggerPending: [1, "Trigger interrupt pending."]
    CH3IF:
      Clear: [0, "No channel 3 capture/compare interrupt enable."]
      CapturePending: [1, "Channel 3 capture/compare interrupt enable."]
    CH2IF:
      Clear: [0, "No channel 2 capture/compare interrupt enable."]
      CapturePending: [1, "Channel 2 capture/compare interrupt enable."]
    CH1IF:
      Clear: [0, "No channel 1 capture/compare interrupt enable."]
      CapturePending: [1, "Channel 1 capture/compare interrupt enable."]
    CH0IF:
      Clear: [0, "No channel 0 capture/compare interrupt enable."]
      CapturePending: [1, "Channel 0 capture/compare interrupt enable."]
    UPIF:
      Clear: [0, "No update interrupt occurred."]
      UpdatePending: [1, "Update interrupt pending."]
  SWEVG:
    TRGG:
      Trigger: [
          1,
          "Trigger event generation
          This bit is set by software and cleared by hardware automatically. When this bit is
          set, the TRGIF flag in TIMERx_STAT register is set, related interrupt or DMA
          transfer can occur if enabled.",
        ]
    CH3G:
      Channel3: [1, "Channel 3’s capture or compare event generation."]
    CH2G:
      Channel2: [1, "Channel 2’s capture or compare event generation."]
    CH1G:
      Channel1: [1, "Channel 1’s capture or compare event generation."]
    CH0G:
      Channel0: [1, "Channel 0’s capture or compare event generation."]
    UPG:
      Update: [
          1,
          "This bit can be set by software, and cleared by hardware automatically. When this
          bit is set, the counter is cleared if the center-aligned or up counting mode is selected,
          else (down counting) it takes the auto-reload value. The prescaler counter is cleared
          at the same time.",
        ]
  CHCTL0_Output:
    CH1COMCEN:
      Disabled: [0, "Channel 1 output compare clear disabled."]
      Enabled: [1, "Channel 1 compare clear enabled."]
    CH1COMSEN:
      Disabled: [0, "Channel 1 output compare shadow disabled."]
      Enabled: [1, "Channel 1 compare shadow enabled."]
    CH1COMFEN:
      Disabled: [0, "Channel 1 output compare fast disabled."]
      Enabled: [1, "Channel 1 compare fast enabled."]
    CH1MS:
      Output: [0, "Channel 1 output mode."]
      InputCI1: [1, "Channel 1 is programmed as input mode, IS1 is connected to CI1FE1"]
      InputCI0: [2, "Channel 1 is programmed as input mode, IS1 is connected to CI0FE1"]
      InputITS: [3, "Channel 1 is programmed as input mode, IS1 is connected to ITS"]
    CH0COMCEN:
      Disabled: [0, "Channel 0 output compare clear disabled."]
      Enabled: [1, "Channel 0 compare clear enabled."]
    CH0COMCTL:
      Mode0: [
          0,
          "Timing mode. The O0CPRE signal keeps stable, independent of the
          comparison between the register TIMERx_CH0CV and the counter TIMERx_CNT.",
        ]
      Mode1: [
          1,
          "Set the channel output. O0CPRE signal is forced high when the counter is
          equals to the output compare register TIMERx_CH0CV.",
        ]
      Mode2: [
          2,
          "Clear the channel output. O0CPRE signal is forced low when the counter is
          equals to the output compare register TIMERx_CH0CV.",
        ]
      Mode3: [
          3,
          "Toggle on match. O0CPRE toggles when the counter is equals to the output
          compare register TIMERx_CH0CV.",
        ]
      Mode4: [4, "Force low. O0CPRE is forced to low level."]
      Mode5: [5, "Force high. O0CPRE is forced to high level."]
      PWMMode0: [
          6,
          "PWM mode0. When counting up, O0CPRE is high when the counter is smaller
          than TIMERx_CH0CV, and low otherwise. When counting down, O0CPRE is low
          when the counter is larger than TIMERx_CH0CV, and high otherwise.",
        ]
      PWMMode1: [
          7,
          "PWM mode1. When counting up, O0CPRE is low when the counter is smaller
          than TIMERx_CH0CV, and high otherwise. When counting down, O0CPRE is high
          when the counter is larger than TIMERx_CH0CV, and low otherwise.",
        ]
    CH1COMCTL:
      Mode0: [
          0,
